# Copy to ~/.config/polytree/config.toml and edit.
backend = "auto"            # auto | git | orca  (auto = orca if installed, else git)
agent   = "claude"          # any key under [agents], or a built-in (claude, codex)
root    = "~/polytree"      # git backend: worktrees live at <root>/<feature>/<repo>
base    = "origin/main"     # optional global default base ref
# subshell = false          # git backend: after the agent exits, land in a shell in the
#                           #   worktree (git worktrees only). Default: true. Set false
#                           #   (or pass --no-subshell) to keep the old exec-in-place behavior.

[[repos]]                   # the first repo (or host = true) hosts the agent
path = "~/code/my-api"
base = "origin/dev"         # optional; overrides the global default
host = true
# orca = "id:<uuid>"        # optional (orca backend): pin the repo in Orca ONLY if it
#                           #   can't be found by path. Get the uuid from:
#                           #   orca project setups --json

[[repos]]
path = "~/code/my-web"
# name = "web"              # optional; needed only if two repos share a basename

# Any agent that accepts extra roots works via config alone:
# [agents.my-agent]
# cmd    = "my-agent --fast"                 # optional; defaults to the table key
# attach = "--root {dir}"                    # required: how it takes an extra dir
# env    = { MY_AGENT_EXTRA = "1" }          # optional
# attach_if_exists = { ".mcp.json" = "--mcp-config {dir}/.mcp.json" }
